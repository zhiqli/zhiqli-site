<!DOCTYPE html>
<html {{- if (eq .Site.Params.mode "dark" ) -}}class="dark" {{ end }}>
{{ partial "header.html" . }}

<body class="about-page">
	<div class="site-shell wrapper">
		{{ partial "head.html" . }}
		<main>
			<article class="post about-card">
				<div class="about-lines">
					{{ range .Params.aboutLines }}
					<p>
						{{ range . }}<span>{{ . }}</span>{{ end }}
					</p>
					{{ end }}
				</div>
			</article>
		</main>
	</div>
	{{ partial "footer.html" . }}
</body>

</html>
